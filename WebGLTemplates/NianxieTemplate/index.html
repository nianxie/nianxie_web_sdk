<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{{ PRODUCT_NAME }}}</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #unity-container, #unity-canvas {
        width: 100%;
        height: 100%;
      }
      #unity-canvas { display: block; }
      #loading {
        position: absolute;
        top: 8px;
        left: 8px;
        color: #fff;
        opacity: 0.9;
        font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
      <div id="loading">Loading...</div>
    </div>

    <script src="./nianxie-interaction-sdk.js"></script>
    <script src="./nianxie-web-bridge.js"></script>
    <script src="./Build/{{{ LOADER_FILENAME }}}"></script>
    <script>
      (function () {
        var canvas = document.querySelector("#unity-canvas");
        var loading = document.getElementById("loading");
        var config = {
          dataUrl: "./Build/{{{ DATA_FILENAME }}}",
          frameworkUrl: "./Build/{{{ FRAMEWORK_FILENAME }}}",
          codeUrl: "./Build/{{{ CODE_FILENAME }}}",
          streamingAssetsUrl: "./Build/StreamingAssets",
          companyName: "{{{ COMPANY_NAME }}}",
          productName: "{{{ PRODUCT_NAME }}}",
          productVersion: "{{{ PRODUCT_VERSION }}}",
        };

        if (typeof createUnityInstance !== "function") {
          console.error("[NxBridge] Unity loader not initialized");
          return;
        }

        createUnityInstance(canvas, config, function (progress) {
          if (loading) loading.textContent = "Loading... " + Math.round(progress * 100) + "%";
        })
          .then(function (instance) {
            if (loading) loading.style.display = "none";
            if (typeof window.bindUnityInstance === "function") {
              window.bindUnityInstance(instance);
            }
          })
          .catch(function (message) {
            console.error("[NxBridge] Unity load failed:", message);
            if (loading) loading.textContent = "Load failed";
          });
      })();
    </script>
  </body>
</html>
