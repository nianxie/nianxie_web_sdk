<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>%PRODUCT_NAME%</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #unity-container, #unity-canvas {
        width: 100%;
        height: 100%;
      }
      #unity-canvas { display: block; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
    </div>

    <script src="./nianxie-interaction-sdk.js"></script>
    <script src="./nianxie-web-bridge.js"></script>
    <script src="%UNITY_WEBGL_LOADER_URL%"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var config = {
        dataUrl: "%UNITY_WEBGL_BUILD_URL%/%UNITY_WEBGL_BUILD_FILENAME_DATA%",
        frameworkUrl: "%UNITY_WEBGL_BUILD_URL%/%UNITY_WEBGL_BUILD_FILENAME_FRAMEWORK%",
        codeUrl: "%UNITY_WEBGL_BUILD_URL%/%UNITY_WEBGL_BUILD_FILENAME_CODE%",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "%COMPANY_NAME%",
        productName: "%PRODUCT_NAME%",
        productVersion: "%PRODUCT_VERSION%",
      };

      createUnityInstance(canvas, config, function () {})
        .then(function (instance) {
          if (typeof window.bindUnityInstance === "function") {
            window.bindUnityInstance(instance);
          }
        })
        .catch(function (message) {
          console.error("[NxBridge] Unity load failed:", message);
        });
    </script>
  </body>
  </html>
